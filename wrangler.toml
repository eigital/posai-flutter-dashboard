# Cloudflare Workers — Flutter web SPA + Supabase Edge Function proxy.
#
# The Worker (workers/proxy.js) serves static Flutter assets from build/web
# and proxies /supabase-fn/* requests to Supabase Edge Functions to avoid CORS.
#
# Build: bash scripts/build.sh
# Deploy: npx wrangler deploy
name = "posai-flutter-dashboard"
compatibility_date = "2025-04-01"
main = "workers/proxy.js"

[assets]
directory = "build/web"
not_found_handling = "single-page-application"
